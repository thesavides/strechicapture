<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0d0d0d"/>

  <!-- Tent outline (Stretchi logo shape) -->
  <path d="M 256,48 Q 182,118 122,182" stroke="white" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 256,48 Q 330,118 390,182" stroke="white" stroke-width="11" fill="none" stroke-linecap="round"/>
  <path d="M 122,182 Q 64,272 26,394" stroke="white" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 390,182 Q 448,272 486,394" stroke="white" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 122,182 Q 188,228 256,218" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 390,182 Q 324,228 256,218" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Mic button (red circle) -->
  <circle cx="256" cy="316" r="90" fill="#e94560"/>
  <!-- Mic body -->
  <rect x="232" y="262" width="48" height="86" rx="24" fill="white"/>
  <!-- Mic arc -->
  <path d="M 214,316 a42,42 0 0 0 84,0" stroke="white" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="256" y1="358" x2="256" y2="382" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="232" y1="382" x2="280" y2="382" stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- STRETCHI TALK label -->
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="40" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">STRETCHI TALK</text>
</svg>
