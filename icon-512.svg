<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="mc">
      <rect x="212" y="185" width="88" height="108" rx="44"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="82" fill="#0d0d0d"/>

  <!-- White tent silhouette
       Shape: high centre peak → right inner shoulder → sharp right tip →
       drape down-right → bottom right → centre opening → mirror left -->
  <path d="
    M 256,44
    C 308,74 372,106 416,128
    L 450,148
    C 474,164 492,196 492,238
    C 492,270 474,298 450,312
    C 426,322 392,320 358,315
    C 326,310 292,303 268,297
    L 256,285
    L 244,297
    C 220,303 186,310 154,315
    C 120,320 86,322 62,312
    C 38,298 20,270 20,238
    C 20,196 38,164 62,148
    L 96,128
    C 140,106 204,74 256,44 Z
  " fill="white"/>

  <!-- Tent panel lines (black over white) -->
  <!-- Ridge: peak → right outer tip -->
  <line x1="256" y1="44" x2="450" y2="148" stroke="#0d0d0d" stroke-width="11" stroke-linecap="round"/>
  <!-- Ridge: peak → left outer tip -->
  <line x1="256" y1="44" x2="62" y2="148" stroke="#0d0d0d" stroke-width="11" stroke-linecap="round"/>
  <!-- Right inner panel line -->
  <path d="M 256,44 C 280,84 302,134 308,178 C 313,212 310,252 298,282"
        stroke="#0d0d0d" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Left inner panel line -->
  <path d="M 256,44 C 232,84 210,134 204,178 C 199,212 202,252 214,282"
        stroke="#0d0d0d" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Red microphone -->
  <!-- Capsule body -->
  <rect x="212" y="185" width="88" height="108" rx="44" fill="#c91e1e"/>
  <!-- Grille lines clipped to capsule -->
  <g clip-path="url(#mc)">
    <line x1="204" y1="207" x2="308" y2="207" stroke="#e85555" stroke-width="5"/>
    <line x1="204" y1="221" x2="308" y2="221" stroke="#e85555" stroke-width="5"/>
    <line x1="204" y1="235" x2="308" y2="235" stroke="#e85555" stroke-width="5"/>
    <line x1="204" y1="249" x2="308" y2="249" stroke="#e85555" stroke-width="5"/>
    <line x1="204" y1="263" x2="308" y2="263" stroke="#e85555" stroke-width="5"/>
    <line x1="204" y1="277" x2="308" y2="277" stroke="#e85555" stroke-width="5"/>
  </g>
  <!-- Stem / neck -->
  <rect x="244" y="293" width="24" height="34" fill="#c91e1e"/>
  <!-- Stand ring -->
  <circle cx="256" cy="348" r="22" fill="none" stroke="#c91e1e" stroke-width="14"/>
  <line x1="256" y1="327" x2="256" y2="364" stroke="#c91e1e" stroke-width="14" stroke-linecap="round"/>

  <!-- STRETCHI label -->
  <text x="256" y="434"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-size="64" font-weight="900" fill="white"
        text-anchor="middle" letter-spacing="4">STRETCHI</text>
</svg>
